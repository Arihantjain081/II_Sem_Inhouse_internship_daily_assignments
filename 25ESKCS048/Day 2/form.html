<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UV-Compatible" contents="ie=edge">
    <title>Document</title>
<style>
   *{ margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        .form-container {
          width:700px;

        }
        input[type="text"], input[type="email"], input[type="password"], input[type="date"], input[type="submit"],select {
            width: 100%;
            padding: 10px;
            margin-top:6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: flex;
            box-shadow: 4px 4px 4px rgba(0, 0, 0, 0.1);
        }
        .form-container{
            background:rgb(135, 169, 211);
            width: 700px;
            padding: 30px;
            border-radius: 8px;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 8px rgba(0.1, 0.1, 0.1, 0.1);
        }
        body{
            background-color: #ecebeb;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 8px rgba(0.1, 0.1, 0.1, 0.1);
          
            padding: 40px;
        }
        label{
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        h1{
            text-align: center;
            margin-bottom: 20px;
            
        }
        .row{
            display: flex;
            justify-content: space-between;
        }
        .row div{
            flex:1;
        }
        .gender{
            display: flex;
            gap: 15px;
            margin-top: 5px;
            justify-content: space-between;
        
        }
        .gender div{
            flex:1;
        }
        button[type="submit"]{
           width:100%;
           margin-top: 25px;
           padding: 10px;
           background-color: #6a5acd;
           color:white;
           border:none;
              border-radius: 4px;
              font-size: 16px;
              cursor: pointer;
        }
        button[type="submit"]:hover{
            background-color: #5a4cb0;
        }
        .password-container{
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .password-container input[type="password"], .password-container input[type="text"]{
            flex: 1;
            
        }
        .show{
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
        }
        .show input{
            width:auto;
        }
        .dob-container{
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="submit"]{
            background-color: #f9f9f9;
        }
</style>
</head>
<body>
    <div class="form-container">
    <form>
        <h1>Registration Form</h1>
        <label>
            NAME:
            <input type="text" id="txtName" required placeholder="Enter Your Name"/>
        </label>
        <br>
        <label>
            Email:
            <input type="email" id="txtEmail" required placeholder="Enter Your Email"/>
        </label>
        <br>
        <label>
            PHONE No:
            <input type="text" id="txtPhone" required placeholder="Enter Your Number"/>
        </label>
        <br>
        <div class="Gender">
            <label> Gender:</label>
            <select id="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        
        
            <label for="dtDOB">DOB:</label>
            <input type="date" id="txtDOB" required placeholder="Enter Date of Birth" />
        </div>
        <div>
        <label> Address:
        </label>
        <input type="text" id="txtAddress" required placeholder="Enter Address" />
        <input type="text" id="txtAddress2" required placeholder="Enter Address Line 2" />
        </div>
      <div class="row">
            <input type="text" id="txtCountry" required placeholder="Enter Country" >
            <input type="text" id="txtCity" required placeholder="Enter City" >
        </div>
        <div class="row">
            <input type="text" id="txtState" required placeholder="Enter State" >
            <input type="text" id="txtZip" required placeholder="Enter Zip Code" >
        </div>
        <br>
           <div class="password-container">
            <label for="pwdpassword">password:</label>
        
        <input type="password" id="pwdpassword" required placeholder="Enter Password">
        <label class="show">
        <input type="checkbox" id="showpassword" onclick="togglePassword()">
        show password
        </label>
        </div>
        <script>
            function togglePassword() {
                var passwordInput = document.getElementById("pwdpassword");
                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                } else {
                    passwordInput.type = "password";
                }
            }
        </script>

<br>
    
    <br>
    
   <input type="submit" value="Submit" id="Submit">
    </form>
    </div>
    
   

        

    </form>
    
</body>
</html>
